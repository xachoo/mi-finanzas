name: Build Android APK (Buildozer)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Utiliza la acción oficial para compilar proyectos Kivy/Python con Buildozer
      - name: Build APK with Buildozer
        uses: ArtemSydoryk/buildozer-action@v1.2.0
        with:
          command: buildozer android debug
          buildozer_version: master

      # Guarda el archivo APK generado para que lo puedas descargar
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: bin/*.apk
