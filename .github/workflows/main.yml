name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Permite ejecutar el proceso manualmente desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código de tu repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configura Java (JDK 17 es la versión requerida para las versiones recientes de Android/Flutter)
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Configura Flutter en la versión estable
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true # Guarda la caché de Flutter para que las siguientes ejecuciones sean más rápidas

      # 4. Obtiene todas las dependencias del proyecto
      - name: Install dependencies
        run: flutter pub get

      # 5. Compila el APK de la aplicación (en modo Release)
      - name: Build APK
        run: flutter build apk --release

      # 6. Sube el archivo APK generado como un Artifact para que lo puedas descargar directamente
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
