name: Build Android APK (Buildozer)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # Usamos ubuntu-22.04 para mayor estabilidad con Buildozer

    steps:
      # 1. Descargar el código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Instalar dependencias del sistema requeridas
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            openjdk-17-jdk \
            zip \
            unzip

      # 4. Instalar Buildozer y Cython
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install "buildozer>=1.5.0" cython

      # 5. Compilar el APK con Buildozer
      - name: Build APK
        env:
          ACCEPT_BUILD_NDK_LICENSES: '1'
        run: |
          buildozer -v android debug

      # 6. Subir el APK resultante a Artifacts
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: bin/*.apk
